<!DOCTYPE html>

        .p-t{font-size:1.2em;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5);font-weight:600;}
        .logo{position:absolute;top:20px;left:20px;font-size:1.5em;font-weight:bold;color:#fff;z-index:15;}
        #l-o{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;opacity:0;visibility:hidden;transition:opacity .5s;}
        #l-o.a{opacity:1;visibility:visible;}
        .spin{border:8px solid rgba(255,255,255,.3);border-top:8px solid #ff0050;border-radius:50%;width:60px;height:60px;animation:s 1.2s linear infinite;margin-bottom:20px;}
        @keyframes s{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
        .l-m{font-size:1.1em;color:#eee;text-align:center;max-width:300px;}
        .p-bb{width:200px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px 0;}
        .p-f{height:100%;background:linear-gradient(90deg,#ff0050,#00f2ea);width:0%;transition:width .3s;}
        #s-p{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:5;opacity:0;pointer-events:none;}
        #c-f,#c{position:absolute;width:1px;height:1px;opacity:0;z-index:-1;}
    </style>
</head>

</body>
</html>
