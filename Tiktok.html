        body {

            border-radius: 50%;

            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);

            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;

        #loading-overlay.active { opacity: 1; visibility: visible; }
        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #ff0050;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1.2s linear infinite;

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .progress-bar { width: 200px; height: 4px; background-color: rgba(255, 255, 255, 0.2); border-radius: 2px; margin: 10px 0; overflow: hidden; }

        .video-info { position: absolute; bottom: 80px; left: 15px; width: 70%; z-index: 15; text-shadow: 0 1px 2px rgba(0,0,0,0.5); transition: opacity 0.5s ease; }
        .username { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .description { font-size: 0.9em; margin-bottom: 5px; line-height: 1.3; }
        .music { display: flex; align-items: center; font-size: 0.85em; }
        .music svg { width: 15px; height: 15px; fill: #fff; margin-right: 5px; animation: spin 3s linear infinite; }
        .hidden-ui { opacity: 0; pointer-events: none; }

        #notification.show { opacity: 1; visibility: visible; }
    </style>
